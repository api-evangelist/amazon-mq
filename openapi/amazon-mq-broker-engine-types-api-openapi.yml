security:
- hmac: []
tags:
- name: Broker Engine Types
paths:
  /v1/broker-engine-types:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    get:
      operationId: DescribeBrokerEngineTypes
      description: Describe available engine types and versions.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeBrokerEngineTypesResponse'
              examples:
                DescribeBrokerEngineTypes200Example:
                  summary: Default DescribeBrokerEngineTypes 200 response
                  x-microcks-default: true
                  value:
                    BrokerEngineTypes: STANDARD
                    MaxResults: example-value
                    NextToken: example-value
        '480':
          description: BadRequestException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestException'
              examples:
                DescribeBrokerEngineTypes480Example:
                  summary: Default DescribeBrokerEngineTypes 480 response
                  x-microcks-default: true
                  value: {}
        '481':
          description: InternalServerErrorException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorException'
              examples:
                DescribeBrokerEngineTypes481Example:
                  summary: Default DescribeBrokerEngineTypes 481 response
                  x-microcks-default: true
                  value: {}
        '482':
          description: ForbiddenException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenException'
              examples:
                DescribeBrokerEngineTypes482Example:
                  summary: Default DescribeBrokerEngineTypes 482 response
                  x-microcks-default: true
                  value: {}
      parameters:
      - name: engineType
        in: query
        required: false
        description: Filter response by engine type.
        schema:
          type: string
      - name: maxResults
        in: query
        required: false
        description: The maximum number of brokers that Amazon MQ can return per page (20 by default). This value must be an integer from 5 to 100.
        schema:
          type: integer
          minimum: 1
          maximum: 100
      - name: nextToken
        in: query
        required: false
        description: The token that specifies the next page of results Amazon MQ should return. To request the first page, leave nextToken empty.
        schema:
          type: string
      summary: Amazon MQ Describe Broker Engine Types
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - Broker Engine Types
components:
  schemas:
    __string:
      type: string
    __listOfBrokerEngineType:
      type: array
      items:
        $ref: '#/components/schemas/BrokerEngineType'
    ForbiddenException: {}
    EngineVersion:
      type: object
      properties:
        Name:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: name
            description: Id for the version.
      description: Id of the engine version.
    InternalServerErrorException: {}
    __integerMin5Max100:
      type: integer
      minimum: 5
      maximum: 100
    BadRequestException: {}
    EngineType:
      type: string
      enum:
      - ACTIVEMQ
      - RABBITMQ
      description: The type of broker engine. Amazon MQ supports ActiveMQ and RabbitMQ.
    DescribeBrokerEngineTypesResponse:
      type: object
      properties:
        BrokerEngineTypes:
          allOf:
          - $ref: '#/components/schemas/__listOfBrokerEngineType'
          - xml:
              name: brokerEngineTypes
            description: List of available engine types and versions.
        MaxResults:
          allOf:
          - $ref: '#/components/schemas/__integerMin5Max100'
          - xml:
              name: maxResults
            description: Required. The maximum number of engine types that can be returned per page (20 by default). This value must be an integer from 5 to 100.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/__string'
          - xml:
              name: nextToken
            description: The token that specifies the next page of results Amazon MQ should return. To request the first page, leave nextToken empty.
    __listOfEngineVersion:
      type: array
      items:
        $ref: '#/components/schemas/EngineVersion'
    BrokerEngineType:
      type: object
      properties:
        EngineType:
          allOf:
          - $ref: '#/components/schemas/EngineType'
          - xml:
              name: engineType
            description: The broker's engine type.
        EngineVersions:
          allOf:
          - $ref: '#/components/schemas/__listOfEngineVersion'
          - xml:
              name: engineVersions
            description: The list of engine versions.
      description: Types of broker engines.
  parameters:
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
