        description: DescribeUser
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: broker-id
          in: path
          type: string
          required: true
          description: The unique ID that Amazon MQ generates for the broker.
        - name: username
          in: path
          type: string
          required: true
          description: The username of the ActiveMQ user. This value can contain only alphanumeric characters, dashes, periods,
            underscores, and tildes (- . _ ~). This value must be 2-100 characters long.
      - name: create-user
        method: POST
        description: CreateUser
        outputRawFormat: json
