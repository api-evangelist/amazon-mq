      hints:
        readOnly: true
        openWorld: true
      call: mq.list-configurations
      outputParameters:
      - type: object
        mapping: $.
    - name: create-configuration
      description: CreateConfiguration
      hints:
        readOnly: false
        openWorld: true
      call: mq.create-configuration
      outputParameters:
      - type: object
        mapping: $.
    - name: list-tags
      description: ListTags
      hints:
        readOnly: true
        openWorld: true
      call: mq.list-tags
      outputParameters:
      - type: object
        mapping: $.
