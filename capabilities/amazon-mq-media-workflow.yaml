naftiko: 1.0.0-alpha2
info:
  label: Amazon MQ Workflow
  description: Workflow capability for Amazon MQ media processing operations for broadcast engineers and media developers.
  tags:
  - AWS
  - Media
  - Broadcasting
  - Workflow
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - type: http
    namespace: mq
    baseUri: http://mq.{region}.amazonaws.com
    description: Amazon MQ REST API
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: default
      path: /
      description: Amazon MQ resources
      operations:
      - name: list-brokers
        method: GET
        description: ListBrokers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: maxResults
          in: query
          type: integer
          required: false
          description: The maximum number of brokers that Amazon MQ can return per page (20 by default). This value must be
            an integer from 5 to 100.
        - name: nextToken
          in: query
          type: string
          required: false
          description: The token that specifies the next page of results Amazon MQ should return. To request the first page,
            leave nextToken empty.
        - name: MaxResults
          in: query
          type: string
          required: false
          description: Pagination limit
        - name: NextToken
          in: query
          type: string
          required: false
          description: Pagination token
      - name: create-broker
        method: POST
        description: CreateBroker
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
