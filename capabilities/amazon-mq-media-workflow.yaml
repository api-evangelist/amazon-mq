  exposes:
  - type: rest
    port: 8080
    namespace: mq-workflow-api
    description: Unified REST API for Amazon MQ workflow management.
    resources:
    - path: /v1/jobs
      name: jobs
      description: Manage media processing jobs
      operations:
      - method: GET
        name: list-jobs
        description: List jobs
        call: mq.list-jobs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: mq-workflow-mcp
    transport: http
    description: MCP server for AI-assisted Amazon MQ workflow management.
    tools:
    - name: list-brokers
      description: ListBrokers
      hints:
        readOnly: true
        openWorld: true
      call: mq.list-brokers
      outputParameters:
      - type: object
        mapping: $.
    - name: create-broker
      description: CreateBroker
      hints:
        readOnly: false
        openWorld: true
