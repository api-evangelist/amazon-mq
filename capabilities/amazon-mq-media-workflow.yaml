            an integer from 5 to 100.
        - name: nextToken
          in: query
          type: string
          required: false
          description: The token that specifies the next page of results Amazon MQ should return. To request the first page,
            leave nextToken empty.
      - name: create-configuration
        method: POST
        description: CreateConfiguration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data: {}
      - name: list-tags
        method: GET
        description: ListTags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resource-arn
          in: path
          type: string
          required: true
          description: The Amazon Resource Name (ARN) of the resource tag.
      - name: create-tags
        method: POST
        description: CreateTags
        outputRawFormat: json
        outputParameters:
